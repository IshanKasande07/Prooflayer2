<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    
    <mask id="mask-mid">
      <rect width="100" height="100" fill="white" />
      <polygon points="50,12 90,32 50,52 10,32" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter" />
    </mask>

    <mask id="mask-bot">
      <rect width="100" height="100" fill="white" />
      <polygon points="50,12 90,32 50,52 10,32" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter" />
      <polygon points="50,30 90,50 50,70 10,50" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter" />
    </mask>
  </defs>

  <polygon points="50,48 90,68 50,88 10,68" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linejoin="miter" mask="url(#mask-bot)" />
  <polygon points="50,30 90,50 50,70 10,50" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linejoin="miter" mask="url(#mask-mid)" />
  <polygon points="50,12 90,32 50,52 10,32" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linejoin="miter" />
</svg>
